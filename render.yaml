services:
  - type: web
    name: sistemas-seguridad-ia
    runtime: python
    pythonVersion: 3.12.0
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT api.app:app
    envVars:
      - key: FLASK_ENV
        value: production
    staticPublishPath: ./public
